# SonarCloud project config — read automatically by the scan action from the repo root.
sonar.projectKey=proops-task-management_user-service
sonar.organization=proops-task-management

# Java / Maven layout
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.java.test.binaries=target/test-classes

# JaCoCo coverage report — produced once the jacoco-maven-plugin is added to the pom
# (D6-D8 hardening). Until then Sonar reports "no coverage" (a warning, not a gate
# failure on config-only PRs). Wrong path here is the #1 cause of "0% coverage".
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# Never analyze build output.
sonar.exclusions=**/target/**
