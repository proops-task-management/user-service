services:
  db-user:
    image: mysql:8.0
    container_name: db-user
    environment:
      MYSQL_DATABASE: ${DB_USER_DATABASE}
      MYSQL_USER: ${DB_USER_USER}
      MYSQL_PASSWORD: ${DB_USER_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_USER_ROOT_PASSWORD}
    volumes:
      - db-user-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    networks:
      - app-net

  user-service:
    image: "${DOCKER_IMAGE:-user-service}:${IMAGE_TAG:-0.0.1}"
    container_name: user-service
    ports:
      - "${PORT:-8081}:${PORT:-8081}"
    environment:
      PORT: ${PORT:-8081}
      SPRING_DATASOURCE_URL: jdbc:mysql://db-user:3306/${DB_USER_DATABASE}
      SPRING_DATASOURCE_USERNAME: ${DB_USER_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_USER_PASSWORD}
      JWT_PRIVATE_KEY: ${JWT_PRIVATE_KEY}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-86400000}
    depends_on:
      db-user:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-net

volumes:
  db-user-data:

networks:
  app-net:
    driver: bridge